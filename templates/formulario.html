{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Fucsia Boutique</title>
    <link rel="icon" href="imagenes/logo.png" type="image/png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'estilosform.css' %}">
</head>
<body>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="formulario-moda">
                    <div class="text-center mb-4">
                        <img src="{% static 'img/logo.webp' %}" alt="Fucsia boutique" class="logo-form mb-3" width="120" height="120">
                        <h1 class="titulo-formulario">Consulta de prendas</h1>
                        <p class="subtitulo-formulario">Déjanos tus datos y cuéntanos qué prenda te interesa.</p>
                    </div>

                    <form action="https://formspree.io/f/xeenwaqo" method="POST"  onsubmit="setTimeout(() => this.reset(), 100);">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="nombre" class="form-label">Nombre completo</label>
                                <input type="text" class="form-control" id="nombre" name="nombre" placeholder="Tu nombre" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="telefono" class="form-label">Teléfono o WhatsApp</label>
                                <input type="tel" class="form-control" id="telefono" name="telefono" placeholder="300 000 0000" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="correo" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="correo" name="correo" placeholder="ejemplo@correo.com" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="categoria" class="form-label">Categoría de interés</label>
                                <select id="categoria" name="categoria" class="form-select" required>
                                    <option value="" disabled selected>Selecciona una categoría</option>
                                    <option value="camisas">Camisas / camisetas</option>
                                    <option value="vestidos">Vestidos</option>
                                    <option value="jeans">Jeans</option>
                                    <option value="chaquetas">Chaquetas</option>
                                    <option value="accesorios">Accesorios</option>
                                </select>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="talla" class="form-label">Talla</label>
                                <select id="talla" name="talla" class="form-select" required>
                                    <option value="" disabled selected>Selecciona tu talla</option>
                                    <option value="xs">XS</option>
                                    <option value="s">S</option>
                                    <option value="m">M</option>
                                    <option value="l">L</option>
                                    <option value="xl">XL</option>
                                    <option value="otro">Otra</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="medio" class="form-label">¿Cómo prefieres que te contacten?</label>
                                <select id="medio" name="medio" class="form-select" required>
                                    <option value="" disabled selected>Selecciona una opción</option>
                                    <option value="whatsapp">WhatsApp</option>
                                    <option value="llamada">Llamada</option>
                                    <option value="correo">Correo electrónico</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea id="mensaje" name="mensaje" class="form-control" rows="4" placeholder="Ejemplo: Quiero saber si tienen disponible la camisa oversize en talla M." required></textarea>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="tratamiento" name="tratamiento" required>
                            <label class="form-check-label" for="tratamiento">
                                Acepto que la tienda use mis datos para responder esta solicitud.
                            </label>
                        </div>

                        <button type="submit" class="btn btn-enviar w-100">Enviar solicitud</button>
                        <a href="{% url 'inicio' %}" class="btn btn-outline-secondary w-100 mt-2">Volver a la página principal</a>
                    </form>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
