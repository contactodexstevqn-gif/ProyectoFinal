{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | Fucsia Boutique</title>

    <link rel="stylesheet" href="{% static 'login.css' %}">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>

    <div class="background-shapes">
        <span class="shape shape-1"></span>
        <span class="shape shape-2"></span>
        <span class="shape shape-3"></span>
    </div>

    <main class="login-page">
        <section class="login-card">

            <div class="login-brand">
                <div class="logo-wrapper">
                    <img src="{% static 'img/logo.png' %}" alt="Logo Fucsia Boutique" class="company-logo">
                </div>

                <div class="brand-text">
                    <h1>Bienvenido</h1>
                    <p>Accede al sistema de Fucsia Boutique</p>
                </div>
            </div>

            {% if messages %}
                <div class="messages">
                    {% for message in messages %}
                        <div class="alert {{ message.tags }}">
                            <i class='bx bx-info-circle'></i>
                            <span>{{ message }}</span>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="POST" class="login-form">
                {% csrf_token %}

                <div class="input-group">
                    <label for="username">Usuario</label>
                    <div class="input-box">
                        <i class='bx bx-user'></i>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Ingresa tu usuario"
                            autocomplete="username"
                            required
                        >
                    </div>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <div class="input-box">
                        <i class='bx bx-lock-alt'></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Ingresa tu contraseña"
                            autocomplete="current-password"
                            required
                        >

                        <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
                            <i class='bx bx-show'></i>
                        </button>
                    </div>
                </div>

                <div class="login-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember">
                        <span>Recordarme</span>
                    </label>

                    <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="login-btn">
                    <i class='bx bx-log-in-circle'></i>
                    <span>Iniciar sesión</span>
                </button>

                <p class="access-text">
                    Acceso exclusivo para usuarios autorizados por el administrador.
                </p>
            </form>

        </section>
    </main>

    <script src="{% static 'login.js' %}"></script>
</body>
</html>
