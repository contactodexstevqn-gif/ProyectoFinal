{% extends 'form_base.html' %}

{% block titulo %}Ajustar stock | Fucsia Boutique{% endblock %}

{% block contenido %}

<header class="form-header">
    <section>
        <h1>Ajustar stock</h1>
        <p>Actualiza las unidades disponibles de {{ producto.nombre }}.</p>
    </section>

    <a href="{% url 'productos' %}" class="back-btn">
        <i class='bx bx-arrow-back'></i>
        Volver
    </a>
</header>

<form method="POST">
    {% csrf_token %}

    <section class="mb-3">
        <label class="form-label">Producto</label>
        <section class="input-icon">
            <i class='bx bx-package'></i>
            <input type="text" class="form-control" value="{{ producto.nombre }}" disabled>
        </section>
    </section>

    <section class="mb-3">
        <label class="form-label">Stock actual</label>
        <section class="input-icon">
            <i class='bx bx-layer'></i>
            <input type="text" class="form-control" value="{{ producto.stock }}" disabled>
        </section>
    </section>

    <section class="mb-3">
        <label class="form-label" for="cantidad">Cantidad a agregar</label>
        <section class="input-icon">
            <i class='bx bx-plus-circle'></i>
            <input 
                type="number" 
                name="cantidad" 
                id="cantidad" 
                class="form-control" 
                min="1" 
                placeholder="Ejemplo: 10"
                required
            >
        </section>
    </section>

    <section class="form-actions">
        <a href="{% url 'productos' %}" class="btn-cancel">
            Cancelar
        </a>

        <button type="submit" class="btn-save">
            <i class='bx bx-save'></i>
            Actualizar stock
        </button>
    </section>
</form>

{% endblock %}
