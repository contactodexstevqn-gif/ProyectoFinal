{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar stock | Fucsia Boutique</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'agregar_producto.css' %}">
</head>

<body>

<main class="product-page">
    <section class="product-card">

        <div class="product-header">
            <div>
                <h1>Actualizar stock</h1>
                <p>Agrega nuevas unidades al producto {{ producto.nombre }}.</p>
            </div>

            <a href="{% url 'productos' %}" class="back-btn">
                <i class='bx bx-arrow-back'></i>
                Volver
            </a>
        </div>

        <form method="POST" class="product-form">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Producto</label>
                <div class="input-icon">
                    <i class='bx bx-package'></i>
                    <input type="text" class="form-control" value="{{ producto.nombre }}" disabled>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Stock actual</label>
                <div class="input-icon">
                    <i class='bx bx-layer'></i>
                    <input type="text" class="form-control" value="{{ producto.stock }}" disabled>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="cantidad">Cantidad a agregar</label>
                <div class="input-icon">
                    <i class='bx bx-plus-circle'></i>
                    <input 
                        type="number" 
                        name="cantidad" 
                        id="cantidad" 
                        class="form-control" 
                        min="1" 
                        placeholder="Ejemplo: 10"
                        required
                    >
                </div>
            </div>

            <div class="form-actions">
                <a href="{% url 'productos' %}" class="btn-cancel">
                    Cancelar
                </a>

                <button type="submit" class="btn-save">
                    <i class='bx bx-save'></i>
                    Actualizar stock
                </button>
            </div>
        </form>

    </section>
</main>

</body>
</html>
