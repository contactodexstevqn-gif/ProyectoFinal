{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categorías | Fucsia Boutique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Categorías</h2>
        <a href="{% url 'agregar_producto' %}" class="btn btn-outline-secondary">← Volver</a>
    </div>

    <div class="card p-4 shadow-sm mb-4">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-mint">Guardar categoría</button>
        </form>
    </div>

    <div class="card p-4 shadow-sm">
        <h5 class="mb-3">Categorías registradas</h5>
        {% if categorias %}
            <ul class="list-group">
                {% for categoria in categorias %}
                    <li class="list-group-item">{{ categoria.nombre }}</li>
                {% endfor %}
            </ul>
        {% else %}
            <p class="text-muted mb-0">Aún no hay categorías registradas.</p>
        {% endif %}
    </div>
</div>
</body>
</html>
