{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}Fucsia Boutique{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'form_base.css' %}">
    <link rel="stylesheet" href="{% static 'sweetalert_custom.css' %}">

    {% block estilos %}
    {% endblock %}
</head>

<body>

<main class="form-page">
    <section class="form-card">
        {% block contenido %}
        {% endblock %}
    </section>
</main>

{% if messages %}
    <section class="django-messages-container">
        {% for message in messages %}
            <article
                class="django-message-data"
                data-type="{{ message.tags|escape }}"
                data-text="{{ message|escape }}">
            </article>
        {% endfor %}
    </section>
{% endif %}

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="{% static 'sweetalert_global.js' %}"></script>
<script src="{% static 'confirmaciones.js' %}"></script>

{% block scripts %}
{% endblock %}

</body>
</html>
