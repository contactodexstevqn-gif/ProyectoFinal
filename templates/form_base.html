{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titulo %}{{ configuracion_tienda.nombre_tienda|default:'Fucsia Boutique' }}{% endblock %}</title>

    <script>
        (function () {
            try {
                const defaultTheme = '{{ configuracion_tienda.tema_defecto|default:"dark"|escapejs }}';
                const savedTheme = localStorage.getItem('theme') || defaultTheme;
                window.SYSTEM_DEFAULT_THEME = defaultTheme;
                const root = document.documentElement;

                root.classList.add('theme-loading');
                root.dataset.theme = savedTheme;
                root.classList.toggle('dark-mode', savedTheme === 'dark');
            } catch (error) {
                document.documentElement.classList.add('theme-loading', 'dark-mode');
                document.documentElement.dataset.theme = 'dark';
                window.SYSTEM_DEFAULT_THEME = 'dark';
            }
        })();
    </script>
    <style>
        html.theme-loading *,
        html.theme-loading *::before,
        html.theme-loading *::after {
            transition: none !important;
        }

        html.dark-mode,
        html.dark-mode body {
            background: #0f172a;
            color-scheme: dark;
        }
    </style>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'form_base.css' %}">
    <link rel="stylesheet" href="{% static 'sweetalert_custom.css' %}">

    {% block estilos %}
    {% endblock %}
</head>

<body>
    <script>
        (function () {
            const isDark = document.documentElement.classList.contains('dark-mode');
            document.body.classList.toggle('dark-mode', isDark);
        })();
    </script>

    <main class="form-page">
        <section class="form-card">
            {% block contenido %}
            {% endblock %}
        </section>
    </main>

    {% if messages %}
    <section class="django-messages-container">
        {% for message in messages %}
        <article class="django-message-data" data-type="{{ message.tags|escape }}" data-text="{{ message|escape }}"></article>
        {% endfor %}
    </section>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{% static 'sweetalert_global.js' %}"></script>
    <script src="{% static 'confirmaciones.js' %}"></script>

    {% block scripts %}
    {% endblock %}

    <script>
        window.addEventListener('load', function () {
            document.documentElement.classList.remove('theme-loading');
        });
    </script>
</body>

</html>
